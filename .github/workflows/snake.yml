name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *" # 每 12 小时自动运行一次
  workflow_dispatch: # 允许手动触发
  push:
    branches:
      - main # 当 main 分支有更新时也触发

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }} # 自动获取你的用户名
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark # 生成暗黑模式版本

      - name: Push to output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output # 动画文件会推送到这个分支
          publish_dir: ./dist
